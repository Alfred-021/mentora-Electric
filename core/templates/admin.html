<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Mentora Electronics</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../static/styles/main.css">
    <!-- Add these scripts in the HEAD section -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<!-- Then your other scripts -->
<script src="auth.js"></script>
<script src="script.js"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-microchip logo-icon"></i>
                    <div class="logo-text">Mentora <span>Electric</span></div>
                </div>
                <nav class="nav">
                    <a href="index.html" class="nav-link">
                        <i class="fas fa-home"></i> Back to Store
                    </a>
                    <a href="#" class="nav-link" id="logoutBtnAdmin">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <section class="section admin-panel">
        <div class="container">
            <div class="admin-header">
                <h2 class="section-title">Admin Panel</h2>
                <button class="btn btn-primary" id="addProductBtn">
                    <i class="fas fa-plus"></i> Add New Product
                </button>
            </div>

            <div class="admin-products-grid" id="adminProductsGrid">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content admin-modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <div class="modal-body admin-modal-body">
                <h2 id="modalTitle">Add New Product</h2>
                <form id="productForm">
                    <div class="form-scroll-container">
                        <div class="form-group">
                            <label for="productTitle">Product Title</label>
                            <input type="text" id="productTitle" name="title" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="productDescription">Description</label>
                            <textarea id="productDescription" name="description" rows="3"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="productCategory">Category</label>
                            <select id="productCategory" name="category" required>
                                <option value="electronic-components">Electronic Components</option>
                                <option value="electronics-gadgets">Electronics Gadgets</option>
                                <option value="diy-modules">DIY Modules</option>
                                <option value="oraimo-products">Oraimo Products</option>
                                <option value="laptops">Laptops</option>
                                <option value="tools">Tools</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="productPrice">Price (Ksh.)</label>
                            <input type="number" id="productPrice" name="price" step="0.01" min="0" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="productImages">Image URLs (one per line)</label>
                            <textarea id="productImages" name="images" rows="3" placeholder="https://example.com/image1.jpg&#10;images/local-image.jpg"></textarea>
                            <small class="form-help">You can use both external URLs (https://) and local paths (images/filename.jpg)</small>
                        </div>
                        
                        <div class="form-group">
                            <label for="productFeatures">Features (one per line)</label>
                            <textarea id="productFeatures" name="features" rows="4" placeholder="Feature 1&#10;Feature 2&#10;Feature 3"></textarea>
                        </div>
                        
                        <div class="form-checkboxes">
                            <div class="form-check">
                                <input type="checkbox" id="productFeatured" name="featured">
                                <label for="productFeatured">Featured Product</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" id="productNew" name="new">
                                <label for="productNew">New Arrival</label>
                            </div>
                            <div class="form-check">
                                <input type="checkbox" id="productOutOfStock" name="out_of_stock">
                                <label for="productOutOfStock">Out of Stock</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Product</button>
                        <button type="button" class="btn btn-secondary" id="cancelProductBtn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2025 Mentora Electronics. Admin Panel</p>
            </div>
        </div>
    </footer>

    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="admin.js"></script>
</body>
</html>
